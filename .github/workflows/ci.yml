name: CI

on:
  push:
  pull_request:

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            graphviz \
            graphviz-dev \
            openjdk-17-jdk \
            unzip \
            curl

      - name: Install ANTLR4 C++ runtime 4.12.0
        run: |
          curl -L -o /tmp/antlr4-cpp-runtime-4.12.0-source.zip \
            https://www.antlr.org/download/antlr4-cpp-runtime-4.12.0-source.zip
          rm -rf /tmp/antlr4-cpp-runtime-4.12.0-source
          unzip -q /tmp/antlr4-cpp-runtime-4.12.0-source.zip -d /tmp/antlr4-cpp-runtime-4.12.0-source
          cmake -B /tmp/antlr4-cpp-runtime-4.12.0-source/build \
            -S /tmp/antlr4-cpp-runtime-4.12.0-source \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DANTLR_BUILD_CPP_TESTS=OFF
          cmake --build /tmp/antlr4-cpp-runtime-4.12.0-source/build --parallel
          sudo cmake --install /tmp/antlr4-cpp-runtime-4.12.0-source/build

      - name: Configure
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Build
        run: cmake --build build --parallel

      - name: Run 2023 LLVM IR smoke tests
        run: |
          TESTS=(
            2023_func_00_main
            2023_func_01_var_defn2
            2023_func_02_var_defn3
            2023_func_06_const_var_defn2
            2023_func_10_var_defn_func
            2023_func_11_add2
            2023_func_12_addc
            2023_func_13_sub2
            2023_func_14_subc
            2023_func_15_mul
            2023_func_16_mulc
            2023_func_17_div
            2023_func_18_divc
            2023_func_19_mod
            2023_func_20_rem
            2023_func_21_if_test2
            2023_func_22_if_test3
            2023_func_23_if_test4
            2023_func_24_if_test5
            2023_func_26_while_test1
            2023_func_27_while_test2
            2023_func_28_while_test3
            2023_func_29_break
            2023_func_30_continue
            2023_func_31_while_if_test1
            2023_func_32_while_if_test2
            2023_func_35_op_priority1
            2023_func_36_op_priority2
            2023_func_37_op_priority3
            2023_func_38_op_priority4
            2023_func_39_op_priority5
            2023_func_40_unary_op
            2023_func_41_unary_op2
            2023_func_43_logi_assign
            2023_func_44_stmt_expr
            2023_func_45_comment1
            2023_func_46_hex_defn
            2023_func_47_hex_oct_add
            2023_func_48_assign_complex_expr
            2023_func_49_if_complex_expr
            2023_func_52_scope
            2023_func_53_scope2
            2023_func_91_many_locals2
          )
          for test_case in "${TESTS[@]}"; do
            MINIC_TEST_MODE=llvmir bash ./tools/run-local-tests.sh 2023 "${test_case}"
          done

      - name: Run 2023 AST smoke tests
        run: |
          TESTS=(
            2023_func_00_main
            2023_func_01_var_defn2
            2023_func_11_add2
            2023_func_12_addc
            2023_func_13_sub2
            2023_func_14_subc
            2023_func_15_mul
            2023_func_16_mulc
            2023_func_17_div
            2023_func_18_divc
            2023_func_19_mod
            2023_func_20_rem
            2023_func_35_op_priority1
            2023_func_36_op_priority2
            2023_func_37_op_priority3
            2023_func_46_hex_defn
            2023_func_47_hex_oct_add
          )
          for test_case in "${TESTS[@]}"; do
            MINIC_TEST_MODE=ast bash ./tools/run-local-tests.sh 2023 "${test_case}"
          done
