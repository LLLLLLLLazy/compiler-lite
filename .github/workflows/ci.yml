name: CI

on:
  push:
  pull_request:

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            flex \
            bison \
            graphviz \
            graphviz-dev \
            openjdk-17-jdk \
            unzip \
            curl \
            gcc-arm-linux-gnueabihf \
            qemu-user-static

      - name: Install ANTLR4 C++ runtime 4.12.0
        run: |
          curl -L -o /tmp/antlr4-cpp-runtime-4.12.0-source.zip \
            https://www.antlr.org/download/antlr4-cpp-runtime-4.12.0-source.zip
          rm -rf /tmp/antlr4-cpp-runtime-4.12.0-source
          unzip -q /tmp/antlr4-cpp-runtime-4.12.0-source.zip -d /tmp/antlr4-cpp-runtime-4.12.0-source
          cmake -B /tmp/antlr4-cpp-runtime-4.12.0-source/build \
            -S /tmp/antlr4-cpp-runtime-4.12.0-source \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DANTLR_BUILD_CPP_TESTS=OFF
          cmake --build /tmp/antlr4-cpp-runtime-4.12.0-source/build --parallel
          sudo cmake --install /tmp/antlr4-cpp-runtime-4.12.0-source/build

      - name: Configure
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Build
        run: cmake --build build --parallel

      - name: Run selected 2023 ASM smoke tests with ANTLR
        run: |
          TESTS=(
            2023_func_00_main
            2023_func_01_var_defn2
            2023_func_11_add2
            2023_func_12_addc
            2023_func_13_sub2
            2023_func_14_subc
            2023_func_15_mul
            2023_func_16_mulc
            2023_func_17_div
            2023_func_18_divc
            2023_func_19_mod
            2023_func_20_rem
            2023_func_35_op_priority1
            2023_func_36_op_priority2
            2023_func_37_op_priority3
            2023_func_46_hex_defn
            2023_func_47_hex_oct_add
          )
          for test_case in "${TESTS[@]}"; do
            MINIC_FRONTEND=antlr MINIC_TEST_MODE=asm bash ./tools/run-local-tests.sh 2023 "${test_case}"
          done

      - name: Run selected 2023 IR smoke tests with ANTLR
        run: |
          TESTS=(
            2023_func_00_main
            2023_func_01_var_defn2
            2023_func_11_add2
            2023_func_12_addc
            2023_func_13_sub2
            2023_func_14_subc
            2023_func_15_mul
            2023_func_16_mulc
            2023_func_17_div
            2023_func_18_divc
            2023_func_19_mod
            2023_func_20_rem
            2023_func_35_op_priority1
            2023_func_36_op_priority2
            2023_func_37_op_priority3
            2023_func_46_hex_defn
            2023_func_47_hex_oct_add
          )
          for test_case in "${TESTS[@]}"; do
            MINIC_FRONTEND=antlr MINIC_TEST_MODE=ir bash ./tools/run-local-tests.sh 2023 "${test_case}"
          done

      - name: Run selected 2023 AST smoke tests with ANTLR
        run: |
          TESTS=(
            2023_func_00_main
            2023_func_01_var_defn2
            2023_func_11_add2
            2023_func_12_addc
            2023_func_13_sub2
            2023_func_14_subc
            2023_func_15_mul
            2023_func_16_mulc
            2023_func_17_div
            2023_func_18_divc
            2023_func_19_mod
            2023_func_20_rem
            2023_func_35_op_priority1
            2023_func_36_op_priority2
            2023_func_37_op_priority3
            2023_func_46_hex_defn
            2023_func_47_hex_oct_add
          )
          for test_case in "${TESTS[@]}"; do
            MINIC_FRONTEND=antlr MINIC_TEST_MODE=ast bash ./tools/run-local-tests.sh 2023 "${test_case}"
          done