name: CI

on:
  push:
  pull_request:

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            gcc-riscv64-linux-gnu \
            ninja-build \
            graphviz \
            graphviz-dev \
            openjdk-17-jdk \
            qemu-user-static \
            unzip \
            curl

      - name: Install ANTLR4 C++ runtime 4.12.0
        run: |
          curl -L -o /tmp/antlr4-cpp-runtime-4.12.0-source.zip \
            https://www.antlr.org/download/antlr4-cpp-runtime-4.12.0-source.zip
          rm -rf /tmp/antlr4-cpp-runtime-4.12.0-source
          unzip -q /tmp/antlr4-cpp-runtime-4.12.0-source.zip -d /tmp/antlr4-cpp-runtime-4.12.0-source
          cmake -B /tmp/antlr4-cpp-runtime-4.12.0-source/build \
            -S /tmp/antlr4-cpp-runtime-4.12.0-source \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DANTLR_BUILD_CPP_TESTS=OFF
          cmake --build /tmp/antlr4-cpp-runtime-4.12.0-source/build --parallel
          sudo cmake --install /tmp/antlr4-cpp-runtime-4.12.0-source/build

      - name: Configure
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Build
        run: cmake --build build --parallel

      - name: Run 2023 LLVM IR smoke tests
        run: |
          while IFS= read -r test_case; do
            [[ -n "${test_case}" ]] || continue
            MINIC_TEST_MODE=llvmir bash ./tools/run-local-tests.sh 2023 "${test_case}"
          done < ./tests/2023_function/llvmir_passed.txt

      - name: Run 2025 LLVM IR smoke tests
        run: |
          while IFS= read -r test_case; do
            [[ -n "${test_case}" ]] || continue
            MINIC_TEST_MODE=llvmir bash ./tools/run-local-tests.sh 2025 "${test_case}"
          done < ./tests/2025_function/llvmir_passed.txt

      - name: Run 2023 RISCV64 asm smoke tests
        run: |
          while IFS= read -r test_case; do
            [[ -n "${test_case}" ]] || continue
            bash ./tools/run-local-riscv64-tests.sh 2023 "${test_case}"
          done < ./tests/2023_function/asm_passed.txt

      - name: Run 2023 AST smoke tests
        run: |
          while IFS= read -r test_case; do
            [[ -n "${test_case}" ]] || continue
            MINIC_TEST_MODE=ast bash ./tools/run-local-tests.sh 2023 "${test_case}"
          done < ./tests/2023_function/ast_passed.txt
